<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Craft</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --text-color: #f8fafc;
            --accent: #10b981;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.15);
        }
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        #app { display: flex; width: 100%; height: 100%; position: relative; }
        #watermark {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            pointer-events: none;
            z-index: 5;
        }
        #workspace {
            flex-grow: 1; position: relative;
            background:
                radial-gradient(circle at center, #1e293b 0%, #020617 100%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            overflow: hidden; touch-action: none;
        }
        #sidebar {
            width: 380px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px); border-left: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; z-index: 10;
            box-shadow: -10px 0 40px rgba(0,0,0,0.8);
        }
        #sidebar-header {
            padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        #sidebar-header h2 {
            margin: 0 0 15px 0; color: #fff; text-transform: uppercase; letter-spacing: 2px; font-weight: 800;
        }
        #search-input {
            width: 100%; padding: 10px 15px; box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 8px; font-size: 14px; font-weight: bold;
            outline: none; transition: 0.2s; margin-bottom: 15px;
        }
        #search-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1; padding: 10px; border-radius: 6px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: var(--accent) !important; color: #000 !important; border-color: var(--accent) !important; }
        .accent-btn {
            background: rgba(16, 185, 129, 0.2) !important;
            color: #10b981 !important;
            border-color: #10b981 !important;
        }
        #log {
            flex-grow: 1; overflow-y: auto; padding: 15px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 15px; align-content: start;
        }
        .item, .log-entry {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; width: 85px; height: 95px; gap: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4); transition: transform 0.1s, border-color 0.2s;
            padding: 8px; box-sizing: border-box;
        }
        .item { position: absolute; cursor: grab; }
        .log-entry { position: relative; cursor: pointer; }
        .item:hover, .log-entry:hover { border-color: rgba(255, 255, 255, 0.4); transform: translateY(-2px); }
        .item.dragging {
            z-index: 1000; cursor: grabbing; transform: scale(1.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); border-color: var(--accent);
        }
        .item-icon {
            width: 55px; height: 55px; display: flex; align-items: center; justify-content: center;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }
    
        .item span, .log-entry span {
            pointer-events: none; font-size: 0.65rem; font-weight: 800;
            text-transform: uppercase; color: #e2e8f0; text-align: center;
            width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        /* --- MODAL STYLES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content {
            background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; width: 80%; max-width: 800px; max-height: 80vh;
            display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-header {
            padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h2 { margin: 0; color: #10b981; font-size: 1.2rem; display: flex; align-items: center; gap: 15px; }
    
        #extra-counter {
            background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 4px 10px;
            border-radius: 20px; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
        .close-btn { background: none; border: none; color: #cbd5e1; font-size: 24px; cursor: pointer; padding: 0; line-height: 1; }
        .close-btn:hover { color: #ef4444; background: none !important; border-color: transparent !important; }
        .modal-body { padding: 20px; overflow-y: auto; }
    
        #extra-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 15px;
        }
        #info-modal .modal-content { max-width: 500px; text-align: center; }
        .info-large-icon { width: 120px; height: 120px; margin: 0 auto 15px auto; }
        .info-date { color: #94a3b8; font-size: 0.9rem; margin-bottom: 5px; }
        .info-version { color: #10b981; font-size: 0.85rem; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px;}
        .recipe-box { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 15px; margin-top: 15px; }
        .recipe-row {
            display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px;
        }
        .recipe-row:last-child { margin-bottom: 0; }
        .mini-item { width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; }
        .mini-item svg { width: 40px; height: 40px; }
        .mini-item span { font-size: 0.6rem; margin-top: 4px; color: #cbd5e1; font-weight: bold; text-transform: uppercase;}
        .recipe-arrow-svg { width: 30px; height: 30px; margin: 0 10px; }
        #unlock-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #10b981; z-index: 9999; pointer-events: none;
            opacity: 0; transition: opacity 0.4s; mix-blend-mode: overlay;
        }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .pop-anim { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
<div id="unlock-flash"></div>

<!-- EXTRA MODAL (Encyclopedia) -->
<div id="extra-modal" class="modal-overlay" onclick="closeExtra(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2>Encyclopedia <span id="extra-counter">0/0</span></h2>
            <button class="close-btn" onclick="closeExtra()">&times;</button>
        </div>
        <div class="modal-body" id="extra-grid"></div>
    </div>
</div>

<!-- INFO MODAL -->
<div id="info-modal" class="modal-overlay" onclick="closeInfo(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 id="info-title">Item Name</h2>
            <button class="close-btn" onclick="closeInfo()">&times;</button>
        </div>
        <div class="modal-body">
            <div id="info-icon" class="info-large-icon"></div>
            <div id="info-date" class="info-date">Discovered: ---</div>
            <div id="info-version" class="info-version">Added in: v1.0</div>
            <h3>How to Craft:</h3>
            <div id="info-recipes" class="recipe-box"></div>
        </div>
    </div>
</div>

<!-- NEW HINT MODAL -->
<div id="hint-modal" class="modal-overlay" onclick="closeHint(event)">
    <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 520px;">
        <div class="modal-header">
            <h2>💡 Hint</h2>
            <button class="close-btn" onclick="closeHint()">&times;</button>
        </div>
        <div class="modal-body" id="hint-body" style="text-align: center; padding: 30px 20px;">
            <!-- Populated by JS -->
        </div>
    </div>
</div>

<div id="app">
    <div id="watermark">game made by Vewerty Ploik</div>
    <div id="workspace"></div>
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>Infinite Craft</h2>
            <input type="text" id="search-input" placeholder="Search items... (or code)" autocomplete="off">
            <div id="controls">
                <button onclick="clearWorkspace()">Clear Board</button>
                <button onclick="resetGame()">Reset Save</button>
                <button class="accent-btn" onclick="openExtra()">Extra</button>
                <button class="accent-btn" onclick="openHint()">Hint</button>
            </div>
        </div>
        <div id="log"></div>
    </div>
</div>

    const baseElements = ["Water", "Fire", "Earth", "Wind"];
    let discoveredItems = [];
    let draggedElement = null;
    let offsetX = 0; let offsetY = 0;
    let currentHintKey = null;   // ← NEW: tracks the current hint so it only changes after you craft it

    const workspace = document.getElementById('workspace');
    const logContainer = document.getElementById('log');
    const sidebar = document.getElementById('sidebar');
    const flashScreen = document.getElementById('unlock-flash');
    const searchInput = document.getElementById('search-input');
    const extraModal = document.getElementById('extra-modal');
    const infoModal = document.getElementById('info-modal');
    const hintModal = document.getElementById('hint-modal');   // ← NEW
    const extraCounter = document.getElementById('extra-counter');

    function getTimestamp() {
        return new Date().toLocaleString(undefined, {
            year: 'numeric', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }

    function init() {
        loadSave();
        renderLog();
        setupDragEvents();
        setupCheatCode();
        setupSearch();
    }

    function loadSave() {
        const saved = localStorage.getItem('infCraft_customArt_save');
        if (saved) {
            let parsed = JSON.parse(saved);
            discoveredItems = parsed.map(item => ({
                name: item.name || item,
                time: item.time || getTimestamp()
            }));
        } else {
            discoveredItems = baseElements.map(name => ({ name, time: getTimestamp() }));
            saveGame();
        }
    }

    function saveGame() { 
        localStorage.setItem('infCraft_customArt_save', JSON.stringify(discoveredItems)); 
    }

    function resetGame() {
        if(confirm("Wipe all progress?")) {
            localStorage.removeItem('infCraft_customArt_save');
            workspace.innerHTML = '';
            searchInput.value = '';
            currentHintKey = null;   // reset hint too
            loadSave();
            renderLog();
        }
    }

    function clearWorkspace() { workspace.innerHTML = ''; }

    function setupSearch() {
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (query.includes("5998")) {
                e.target.value = "";
                triggerUnlockAll();
            } else {
                renderLog(query);
            }
        });
    }

    function renderLog(filterText = "") {
        logContainer.innerHTML = '';
        discoveredItems.forEach(item => {
            if (filterText && !item.name.toLowerCase().includes(filterText)) return;
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const iconDiv = document.createElement('div');
            iconDiv.className = 'item-icon';
            iconDiv.innerHTML = getCustomArt(item.name);
            const textSpan = document.createElement('span');
            textSpan.innerText = item.name;
            entry.appendChild(iconDiv);
            entry.appendChild(textSpan);
            entry.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                const wsRect = workspace.getBoundingClientRect();
                const maxX = Math.max(0, wsRect.width - 90);
                const maxY = Math.max(0, wsRect.height - 100);
                const randX = Math.floor(Math.random() * maxX);
                const randY = Math.floor(Math.random() * maxY);
                createWorkspaceItem(item.name, randX, randY, true);
            });
            logContainer.appendChild(entry);
        });
    }

    function createWorkspaceItem(itemName, x, y, animate = false) {
        const el = document.createElement('div');
        el.className = 'item';
        if(animate) el.classList.add('pop-anim');
        const iconDiv = document.createElement('div');
        iconDiv.className = 'item-icon';
        iconDiv.innerHTML = getCustomArt(itemName);
        const textSpan = document.createElement('span');
        textSpan.innerText = itemName;
        el.appendChild(iconDiv);
        el.appendChild(textSpan);
        el.dataset.name = itemName;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        el.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            const currentX = parseFloat(el.style.left);
            const currentY = parseFloat(el.style.top);
            createWorkspaceItem(itemName, currentX + 25, currentY + 25, true);
        });
        workspace.appendChild(el);
        if(animate) setTimeout(() => el.classList.remove('pop-anim'), 400);
        return el;
    }

    function startDragging(el, e) {
        draggedElement = el;
        const rect = el.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        el.classList.add('dragging');
        el.setPointerCapture(e.pointerId);
    }

    function setupDragEvents() {
        document.addEventListener('pointerdown', (e) => {
            const target = e.target.closest('.item');
            if (target && target.parentElement === workspace) {
                e.preventDefault();
                startDragging(target, e);
            }
        });
        document.addEventListener('pointermove', (e) => {
            if (!draggedElement) return;
            e.preventDefault();
            const wsRect = workspace.getBoundingClientRect();
            draggedElement.style.left = `${e.clientX - wsRect.left - offsetX}px`;
            draggedElement.style.top = `${e.clientY - wsRect.top - offsetY}px`;
        }, { passive: false });
        document.addEventListener('pointerup', (e) => {
            if (!draggedElement) return;
            draggedElement.classList.remove('dragging');
            if (e.pointerId) draggedElement.releasePointerCapture(e.pointerId);
            const sbRect = sidebar.getBoundingClientRect();
            if (e.clientX >= sbRect.left && e.clientY >= sbRect.top && e.clientY <= sbRect.bottom) {
                draggedElement.remove();
            } else {
                checkForCombination(draggedElement);
            }
            draggedElement = null;
        });
    }

    function checkForCombination(draggedEl) {
        const items = Array.from(workspace.querySelectorAll('.item'));
        const rect1 = draggedEl.getBoundingClientRect();
        for (let otherEl of items) {
            if (otherEl === draggedEl) continue;
            const rect2 = otherEl.getBoundingClientRect();
            if (!(rect1.right - 15 < rect2.left + 15 || rect1.left + 15 > rect2.right - 15 ||
                  rect1.bottom - 15 < rect2.top + 15 || rect1.top + 15 > rect2.bottom + 15)) {
                const name1 = draggedEl.dataset.name;
                const name2 = otherEl.dataset.name;
                const sortedKey = [name1, name2].sort().join('+');
                if (recipes[sortedKey]) {
                    combineItems(draggedEl, otherEl, recipes[sortedKey]);
                    break;
                }
            }
        }
    }

    function combineItems(el1, el2, resultName) {
        const r1 = el1.getBoundingClientRect();
        const r2 = el2.getBoundingClientRect();
        const wsRect = workspace.getBoundingClientRect();
        const centerX = ((r1.left + r2.left) / 2) - wsRect.left;
        const centerY = ((r1.top + r2.top) / 2) - wsRect.top;

        el1.remove(); 
        el2.remove();

        const wasNew = !discoveredItems.some(item => item.name === resultName);

        if (wasNew) {
            discoveredItems.push({ name: resultName, time: getTimestamp() });
            saveGame();
            renderLog(searchInput.value.toLowerCase());

            // If this was the hinted combination → clear the hint so next openHint() gives a fresh one
            if (currentHintKey && recipes[currentHintKey] === resultName) {
                currentHintKey = null;
            }
        }

        createWorkspaceItem(resultName, centerX, centerY, true);
    }

    // ====================== NEW HINT SYSTEM ======================
    function openHint() {
        const discoveredNames = new Set(discoveredItems.map(i => i.name));

        let possibleHints = [];
        for (let key in recipes) {
            if (!key.includes('+')) continue;
            const parts = key.split('+');
            const ing1 = parts[0];
            const ing2 = parts[1];
            const result = recipes[key];

            if (discoveredNames.has(ing1) && 
                discoveredNames.has(ing2) && 
                !discoveredNames.has(result)) {
                possibleHints.push({key, ing1, ing2, result});
            }
        }

        if (possibleHints.length === 0) {
            document.getElementById('hint-body').innerHTML = `
                <p style="color:#94a3b8; font-size:1.1rem; margin:40px 0;">
                    🎉 No more hints available!<br>
                    You have discovered every possible item!
                </p>`;
            hintModal.classList.add('active');
            return;
        }

        // Keep the same hint until the player actually crafts it
        let hintData = possibleHints.find(h => h.key === currentHintKey);
        if (!hintData) {
            hintData = possibleHints[Math.floor(Math.random() * possibleHints.length)];
            currentHintKey = hintData.key;
        }

        document.getElementById('hint-body').innerHTML = `
            <p style="margin-bottom:20px; font-weight:bold; color:#10b981;">Try this combination to discover something new!</p>
            <div class="recipe-row" style="justify-content: center; margin-bottom: 25px;">
                <div class="mini-item">
                    ${getCustomArt(hintData.ing1)}
                    <span>${hintData.ing1}</span>
                </div>
                ${customArrowSVG}
                <div class="mini-item">
                    ${getCustomArt(hintData.ing2)}
                    <span>${hintData.ing2}</span>
                </div>
            </div>
            <p style="font-size:1.2rem; font-weight:800; margin:0;">Leads to: <span style="color:#10b981;">${hintData.result}</span></p>
            <p style="color:#64748b; font-size:0.85rem; margin-top:30px;">Tap anywhere outside to close</p>
        `;

        hintModal.classList.add('active');
    }

    function closeHint(e) {
        if (!e || e.target.id === 'hint-modal' || e.target.classList.contains('close-btn')) {
            hintModal.classList.remove('active');
        }
    }

    // ====================== EXTRA / ENCYCLOPEDIA ======================
    function openExtra() {
        const grid = document.getElementById('extra-grid');
        grid.innerHTML = `
            <div style="grid-column: 1 / -1; text-align:center; padding:12px 0; color:#94a3b8; font-size:0.9rem; font-weight:500;">
                 Tap an item to view details, recipes &amp; discovery date
            </div>`;
        
        const totalItems = Object.keys(svgArt).length;
        extraCounter.innerText = `${discoveredItems.length} / ${totalItems} Discovered`;

        discoveredItems.forEach(item => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const iconDiv = document.createElement('div');
            iconDiv.className = 'item-icon';
            iconDiv.innerHTML = getCustomArt(item.name);
            const textSpan = document.createElement('span');
            textSpan.innerText = item.name;
            entry.appendChild(iconDiv);
            entry.appendChild(textSpan);
            entry.addEventListener('click', () => openInfo(item));
            grid.appendChild(entry);
        });

        extraModal.classList.add('active');
    }

    function closeExtra(e) {
        if (!e || e.target === extraModal || e.target.classList.contains('close-btn')) {
            extraModal.classList.remove('active');
        }
    }

    function openInfo(itemData) {
        document.getElementById('info-title').innerText = itemData.name;
        document.getElementById('info-icon').innerHTML = getCustomArt(itemData.name);
        document.getElementById('info-date').innerText = `Discovered: ${itemData.time}`;
        const versionStr = v1_1_Items.includes(itemData.name) ? "v1.1" : "v1.0";
        document.getElementById('info-version').innerText = `Added in: ${versionStr}`;

        const recipeContainer = document.getElementById('info-recipes');
        recipeContainer.innerHTML = '';
        const waysToCraft = recipeDisplay[itemData.name] || [];
        const discoveredSet = new Set(discoveredItems.map(i => i.name));

        if (waysToCraft.length === 0) {
            recipeContainer.innerHTML = '<p style="color: #cbd5e1; font-weight: bold; margin: 0;">Base Element (No crafting required)</p>';
        } else {
            waysToCraft.forEach(recipeKey => {
                const parts = recipeKey.split('+');
                const ing1 = parts[0];
                const ing2 = parts[1];
                const hasBoth = discoveredSet.has(ing1) && discoveredSet.has(ing2);
                let rowHTML;
                if (hasBoth) {
                    rowHTML = `
                        <div class="recipe-row">
                            <div class="mini-item">
                                ${getCustomArt(ing1)}
                                <span>${ing1}</span>
                            </div>
                            ${customArrowSVG}
                            <div class="mini-item">
                                ${getCustomArt(ing2)}
                                <span>${ing2}</span>
                            </div>
                        </div>
                    `;
                } else {
                    rowHTML = `
                        <div class="recipe-row">
                            <div class="mini-item">
                                ${unknownSVG}
                                <span>???</span>
                            </div>
                            ${customArrowSVG}
                            <div class="mini-item">
                                ${unknownSVG}
                                <span>???</span>
                            </div>
                        </div>
                    `;
                }
                recipeContainer.innerHTML += rowHTML;
            });
        }
        infoModal.classList.add('active');
    }

    function closeInfo(e) {
        if (!e || e.target === infoModal || e.target.classList.contains('close-btn')) {
            infoModal.classList.remove('active');
        }
    }

    function setupCheatCode() {
        let keyBuffer = "";
        document.addEventListener('keydown', (e) => {
            if (e.target === searchInput) return;
            keyBuffer += e.key;
            if (keyBuffer.length > 10) keyBuffer = keyBuffer.substring(1);
            if (keyBuffer.includes("5998")) {
                keyBuffer = "";
                triggerUnlockAll();
            }
        });
    }

    function triggerUnlockAll() {
        flashScreen.style.opacity = "1";
        setTimeout(() => flashScreen.style.opacity = "0", 400);
        let allPossibleItems = new Set(baseElements);
        Object.values(recipes).forEach(item => allPossibleItems.add(item));
        Object.keys(svgArt).forEach(item => allPossibleItems.add(item));
        const currentTime = getTimestamp();
        allPossibleItems.forEach(itemName => {
            if (!discoveredItems.some(item => item.name === itemName)) {
                discoveredItems.push({ name: itemName, time: currentTime });
            }
        });
        currentHintKey = null;   // reset hint after unlock all
        saveGame();
        renderLog(searchInput.value.toLowerCase());
        if (extraModal.classList.contains('active')) openExtra();
    }

    init();
</script>
